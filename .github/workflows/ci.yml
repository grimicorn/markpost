name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          HUSKY: 0
      - run: npm run lint:ci
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}
      - run: npx nuxt prepare
      - run: npm run test:ci

  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'app/**'
              - 'server/**'
              - 'e2e/**'
              - 'public/**'
              - 'nuxt.config.ts'
              - 'playwright.config.ts'
              - 'package-lock.json'

  e2e:
    needs: [ci, changes]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          HUSKY: 0
      - run: npx playwright install chromium --with-deps
      - run: npm run e2e
        env:
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NUXT_CLERK_SECRET_KEY: ${{ secrets.NUXT_CLERK_SECRET_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/report/
          retention-days: 7

  e2e-gate:
    name: E2E Gate
    needs: [e2e]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        run: |
          result="${{ needs.e2e.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "E2E: $result"
          else
            echo "E2E failed with result: $result"
            exit 1
          fi

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          HUSKY: 0
      - run: npm run lint:ci
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}
      - run: npx nuxt prepare
      - run: npm run test:ci

  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            src:
              - 'app/**'
              - 'server/**'
              - 'e2e/**'
              - 'public/**'
              - 'nuxt.config.ts'
              - 'playwright.config.ts'
              - 'package-lock.json'
              - 'package.json'
              - '.nvmrc'

  generate-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      test-files: ${{ steps.find-tests.outputs.test-files }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - id: find-tests
        run: |
          files=$(find e2e -name "*.spec.ts" -exec basename {} .spec.ts \; | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "test-files=$files" >> $GITHUB_OUTPUT

  e2e:
    needs: [ci, changes, generate-matrix]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        test-file: ${{ fromJson(needs.generate-matrix.outputs.test-files) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          HUSKY: 0
      - run: npx playwright install chromium --with-deps
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@72ed4f69a12b6be9c16aebfad893f6a21e9aba8b # v6.4.0
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.test-file }}
      - run: npm run e2e -- "e2e/$TEST_FILE.spec.ts"
        env:
          TEST_FILE: ${{ matrix.test-file }}
          E2E_DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NUXT_CLERK_SECRET_KEY: ${{ secrets.NUXT_CLERK_SECRET_KEY }}
          E2E_CLERK_TEST_EMAIL: ${{ secrets.E2E_CLERK_TEST_EMAIL }}
          E2E_CLERK_TEST_PASSWORD: ${{ secrets.E2E_CLERK_TEST_PASSWORD }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.test-file }}
          path: e2e/report/
          retention-days: 7
      - name: Delete Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3.2.1
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.test-file }}

  e2e-gate:
    name: E2E Gate
    needs: [e2e]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        run: |
          result="${{ needs.e2e.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "E2E: $result"
          else
            echo "E2E failed with result: $result"
            exit 1
          fi

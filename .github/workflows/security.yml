name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned gitleaks release. Bump GITLEAKS_VERSION and GITLEAKS_SHA256 together,
  # in lockstep with the local install. The SHA is the linux x64 tarball digest
  # from the release's checksums.txt; pinning it here (rather than trusting a
  # checksums file from the same release) makes the trusted artifact auditable
  # in the diff and guards against a tampered release, not just transport errors.
  GITLEAKS_VERSION: 8.30.1
  GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSL "${base}/${archive}" -o "${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check -
          tar -xzf "${archive}" gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f "${archive}" gitleaks
          gitleaks version
      - name: Scan pull request commit range
        if: github.event_name == 'pull_request'
        run: |
          gitleaks git \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1 \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
      - name: Scan full history
        if: github.event_name == 'push'
        run: |
          gitleaks git \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1

  dependency-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          HUSKY: 0
      - name: Summarize moderate and low advisories
        run: npm audit --audit-level=moderate || true
      - name: Fail on high or critical advisories
        run: npm audit --audit-level=high
